<svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg">
<!-- ── BACKGROUND (dimmed game field) ── -->
<rect width="960" height="540" fill="#09070F" opacity="0.9"/>
<rect width="960" height="540" fill="none" stroke="#1A1428" stroke-width="1"/>
<!-- Blur hint lines -->
<rect x="40" y="60" width="880" height="420" rx="4" fill="none" stroke="#2A1F40" stroke-width="1" opacity="0.3"/>

<!-- ── MODAL BACKDROP ── -->
<rect x="160" y="60" width="640" height="420" rx="8" fill="#1E1730" stroke="#4A3A5C" stroke-width="2"/>
<!-- Gold accent top bar -->
<rect x="160" y="60" width="640" height="52" rx="8" fill="#2A1F40"/>
<rect x="160" y="96" width="640" height="16" fill="#2A1F40"/>

<!-- Modal title -->
<text x="480" y="93" text-anchor="middle" font-family="sans-serif" font-size="17" fill="#FAC775" font-weight="bold">⚔  猜拳判定</text>
<rect x="160" y="112" width="640" height="1" fill="#4A3A5C"/>

<!-- Sub-info -->
<text x="480" y="134" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#8A8494">攻击方已消耗 1气 作为行动成本 · Miss 不退还</text>

<!-- ── ATTACKER PANEL (left) ── -->
<rect x="178" y="148" width="240" height="220" rx="5" fill="#1A1228" stroke="#C9A84C" stroke-width="1.5"/>
<text x="298" y="170" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#C9A84C">⚔ 攻击方</text>
<!-- Portrait -->
<rect x="218" y="178" width="120" height="100" rx="4" fill="#2A1F40" stroke="#C9A84C" stroke-width="1.5"/>
<text x="278" y="238" text-anchor="middle" font-family="sans-serif" font-size="36" fill="#C9A84C">鸣</text>
<text x="298" y="296" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#F0E6D3" font-weight="bold">漩涡鸣人</text>
<!-- HP mini -->
<rect x="218" y="304" width="120" height="10" fill="#2A1030" rx="2"/>
<rect x="218" y="304" width="80" height="10" fill="#C84C4C" rx="2"/>
<text x="278" y="313" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#F0E6D3">HP 4/6</text>
<!-- Energy -->
<text x="298" y="336" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#7ABCE8">剩余气：3  →  本次1气</text>
<text x="298" y="352" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5AFC9A" font-weight="bold">使用后剩余: 2气</text>

<!-- VS divider -->
<text x="480" y="278" text-anchor="middle" font-family="sans-serif" font-size="32" fill="#4A3A5C" font-weight="bold">VS</text>
<line x1="480" y1="148" x2="480" y2="368" stroke="#3A2A4C" stroke-width="1" stroke-dasharray="6,4"/>

<!-- ── DEFENDER PANEL (right) ── -->
<rect x="542" y="148" width="240" height="220" rx="5" fill="#1A1228" stroke="#4A3A5C" stroke-width="1.5"/>
<text x="662" y="170" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#8A8494">🛡 防御方</text>
<!-- Portrait -->
<rect x="602" y="178" width="120" height="100" rx="4" fill="#1A1430" stroke="#4A3A5C" stroke-width="1.5"/>
<text x="662" y="238" text-anchor="middle" font-family="sans-serif" font-size="36" fill="#4C5CC8">佐</text>
<text x="662" y="296" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#F0E6D3" font-weight="bold">宇智波佐助</text>
<rect x="602" y="304" width="120" height="10" fill="#2A1030" rx="2"/>
<rect x="602" y="304" width="100" height="10" fill="#C84C4C" rx="2"/>
<text x="662" y="313" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#F0E6D3">HP 5/6</text>
<text x="662" y="336" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#8A8494">被攻击不消耗回合</text>
<text x="662" y="352" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#8A8494">防御无额外奖励</text>

<!-- Rule reminder -->
<rect x="178" y="374" width="604" height="26" fill="#120E1E" stroke="#3A2A4C" rx="3"/>
<text x="480" y="391" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6A6070">克制: 石头 &gt; 剪刀 &gt; 布 &gt; 石头 · 平局视为 Miss · 攻击方赢才算命中</text>

<!-- ── GESTURE BUTTONS ── -->
<text x="480" y="424" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#C9A84C" font-weight="bold">选择手势</text>

<!-- Rock -->
<rect x="190" y="432" width="166" height="60" fill="#201530" stroke="#7A5A9C" stroke-width="2" rx="6"/>
<text x="273" y="458" text-anchor="middle" font-family="sans-serif" font-size="24">✊</text>
<text x="273" y="480" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#C9A84C" font-weight="bold">石头</text>

<!-- Scissors -->
<rect x="397" y="432" width="166" height="60" fill="#201530" stroke="#7A5A9C" stroke-width="2" rx="6"/>
<text x="480" y="458" text-anchor="middle" font-family="sans-serif" font-size="24">✌</text>
<text x="480" y="480" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#C9A84C" font-weight="bold">剪刀</text>

<!-- Paper -->
<rect x="604" y="432" width="166" height="60" fill="#201530" stroke="#7A5A9C" stroke-width="2" rx="6"/>
<text x="687" y="458" text-anchor="middle" font-family="sans-serif" font-size="24">🖐</text>
<text x="687" y="480" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#C9A84C" font-weight="bold">布</text>

<!-- Waiting status -->
<text x="480" y="516" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5A5070">攻击方未出拳 · 防御方等待（AI自动）</text>

<!-- ── OUTCOME EXAMPLES (annotation) ── -->
<rect x="170" y="524" width="280" height="12" fill="none"/>
<text x="175" y="534" font-family="sans-serif" font-size="9" fill="#2A8C5A">✓ 攻击方赢 → 命中 → 选择技能 → 消耗技能气 → 执行效果</text>
<text x="505" y="534" font-family="sans-serif" font-size="9" fill="#8A3A3A">✗ 攻击方输/平 → Miss → 1气已消耗 · 本回合攻击结束</text>
</svg>
